services:
  vllm-ipex-serving:
    container_name: vllm-ipex-serving
    image: intel/llm-scaler-vllm:0.14.0-b8.1  # intel/llm-scaler-vllm:0.14.0-b7.1
    privileged: true
    restart: always
    ports:
      - ${VLLM_SERVICE_PORT-41091}:8000
    group_add:
      - ${VIDEO_GROUP_ID}     # Use the environment variable for the video group ID
      - ${RENDER_GROUP_ID}    # Use the environment variable for the render group ID
    volumes:
      - ${HF_HOME}:/llm/.cache/huggingface
      - ./test_resources:/llm/test_resources:ro
    devices:
      - /dev/dri
    environment:
      no_proxy: localhost,127.0.0.1
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      HF_ENDPOINT: https://hf-mirror.com
      HF_HOME: /llm/.cache/huggingface
      MODEL_PATH: ${LLM_MODEL}
      SERVED_MODEL_NAME: ${LLM_MODEL}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-20000}
      LOAD_QUANTIZATION: ${LOAD_QUANTIZATION:-fp8}
      TENSOR_PARALLEL_SIZE: ${TENSOR_PARALLEL_SIZE:-1}
      # ONEAPI_DEVICE_SELECTOR: ${ONEAPI_DEVICE_SELECTOR:-level_zero:0}
      # ZE_AFFINITY_MASK: 0,1
    shm_size: '16g'
    entrypoint: /bin/bash -c "\
      source /opt/intel/oneapi/setvars.sh --force && \
      cd /llm/test_resources && \
      bash start_server_enable_cache.sh"
