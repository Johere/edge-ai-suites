server:
  host: "0.0.0.0"
  port: 8999

webhook:
  url: "http://localhost:18800/events"
  timeout: 10
  retry_attempts: 3
  retry_delay: 2

# `data_dir` is the *root* directory for all per-source output.
# Each registered source gets its own subdirectory `<data_dir>/<source_id>/`
# (or whatever absolute path the register_source body specifies in its
# `data_dir` field; MCP sends an absolute per-source path).
data_dir: "~/.smartbuilding/data"

defaults:
  motion:
    enabled: true
    diff_threshold: 15
    area_ratio: 0.005
    stable_frames: 45
  segment:
    interval: 10
    min_duration: 1.0
  recording:
    enabled: true
    interval_seconds: 60
    fps: 15
    retention_days: 5
  prefilter:
    enabled: true
    model_path: "/models/openvino/shape_static_1280x704/yolo11s/FP16/yolo11s.xml"
    target_classes: ["person"]
    min_confidence: 0.4
    min_frames_hit: 1
    detect_fps: 2.0
    device: "NPU"
  health:
    max_failures: 30
    recovery_strategy: "retry"
    backoff_base: 2.0
    backoff_max: 120.0

logging:
  level: "INFO"
