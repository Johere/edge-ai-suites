{{- $globalDevices := default (dict) .Values.global.devices -}}
{{- $mmDevices := default (dict) (index $globalDevices "multimodalEmbedding") -}}
{{- $mmDevice := upper (default "CPU" (index $mmDevices "device")) -}}
{{- $mmUsesGpu := eq $mmDevice "GPU" -}}
{{- $mmUsesNpu := eq $mmDevice "NPU" -}}
{{- $mmUsesAccelerator := or $mmUsesGpu $mmUsesNpu -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: multimodal-embedding-serving-config
  labels:
    {{- include "lvs.mmes.labels" . | nindent 4 }}
data:
  EMBEDDING_MODEL_NAME: {{ required "global.env.embeddingModelName must be set (use user_values_override.yaml)" .Values.global.env.embeddingModelName | quote }}
  EMBEDDING_DEVICE: {{ $mmDevice | quote }}
  EMBEDDING_USE_OV: {{ ternary "true" .Values.global.env.embeddingUseOv $mmUsesAccelerator | quote }}
  EMBEDDING_OV_MODELS_DIR: {{ .Values.global.env.ovModelsDir | quote }}
  OV_CACHE_DIR: {{ .Values.ovCacheDir | default "/app/ov_models/ov_cache" | quote }}
  DEFAULT_START_OFFSET_SEC: {{ .Values.global.env.defaultStartOffsetSec | quote }}
  DEFAULT_CLIP_DURATION: {{ .Values.global.env.defaultClipDuration | quote }}
  DEFAULT_NUM_FRAMES: {{ .Values.global.env.defaultNumFrames | quote }}
  INFER_BATCH_SIZE: {{ .Values.global.env.inferBatchSize | default 32 | quote }}
  PREPROCESS_WORKERS: {{ .Values.global.env.preprocessWorkers | default 8 | quote }}
  VIDEO_FRAME_BATCH_SIZE: {{ .Values.global.env.videoFrameBatchSize | default 64 | quote }}
  VIDEO_FRAME_QUEUE_SIZE: {{ .Values.global.env.videoFrameQueueSize | default 32 | quote }}
  VIDEO_FRAME_SHM_POOL_BLOCK_SIZE: {{ .Values.global.env.videoFrameShmPoolBlockSize | default 6220800 | int | quote }}
  VIDEO_FRAME_SHM_POOL_BLOCKS_MULTIPLIER: {{ .Values.global.env.videoFrameShmPoolBlocksMultiplier | default 2 | quote }}
  VIDEO_FRAME_LOG_LEVEL: {{ .Values.global.env.videoFrameLogLevel | default "INFO" | quote }}
  OV_PERFORMANCE_MODE: {{ ternary "LATENCY" .Values.global.env.ovPerformanceMode $mmUsesAccelerator | quote }}
  HF_HOME: "/home/appuser/.cache/huggingface"
  HF_TOKEN_PATH: "/tmp/hf_token"
  HF_HUB_DISABLE_IMPLICIT_TOKEN: "1"
  TRANSFORMERS_CACHE: "/home/appuser/.cache/huggingface"
  HUGGINGFACE_HUB_CACHE: "/home/appuser/.cache/huggingface"
  XDG_CACHE_HOME: "/home/appuser/.cache"
  http_proxy: {{ .Values.global.proxy.httpProxy | quote }}
  https_proxy: {{ .Values.global.proxy.httpsProxy | quote }}
  no_proxy: "{{ .Values.global.proxy.noProxy }},minio-service,vdms-dataprep,localhost"
  no_proxy_env: "{{ .Values.global.proxy.noProxy }},minio-service,vdms-dataprep,localhost"
