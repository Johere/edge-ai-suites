{{- $globalDevices := default (dict) .Values.global.devices -}}
{{- $mmDevices := default (dict) (index $globalDevices "multimodalEmbedding") -}}
{{- $mmDevice := upper (default "CPU" (index $mmDevices "device")) -}}
{{- $mmKey := default "" (index $mmDevices "key") -}}
{{- $mmUsesGpu := eq $mmDevice "GPU" -}}
{{- $mmUsesNpu := eq $mmDevice "NPU" -}}
{{- $mmUsesAccelerator := or $mmUsesGpu $mmUsesNpu -}}
{{- if and $mmUsesAccelerator (eq (trim $mmKey) "") -}}
{{- fail "global.devices.multimodalEmbedding.key is required when device is GPU or NPU" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multimodal-embedding-serving
  labels:
    {{- include "lvs.mmes.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: multimodal-embedding-serving
  template:
    metadata:
      labels:
        app: multimodal-embedding-serving
        {{- include "lvs.mmes.selectorLabels" . | nindent 8 }}
    spec:
      {{- if or .Values.affinity .Values.podAffinity }}
      affinity:
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.podAffinity }}
        podAffinity:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}
      {{- if or .Values.podSecurityContext $mmUsesAccelerator }}
      securityContext:
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $mmUsesAccelerator }}
        supplementalGroups:
          {{- range .Values.global.accelGroupIds }}
          - {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: multimodal-embedding-serving
          image: {{ include "lvs.mmes.image" (dict "registry" (default .Values.global.registry .Values.imageOverride.registry) "repository" (default .Values.images.multimodalEmbeddingServing.repository .Values.imageOverride.repository) "tag" (default (include "lvs.mmes.vssTag" .) .Values.imageOverride.tag)) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: multimodal-embedding-serving-config
          ports:
            - containerPort: 8000
              name: http
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $mmUsesAccelerator }}
          resources:
            requests:
              {{ $mmKey }}: 1
            limits:
              {{ $mmKey }}: 1
          {{- else if .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: volume-data
              mountPath: /home/appuser/.cache/huggingface
              subPath: huggingface
            - name: volume-data
              mountPath: {{ .Values.global.env.ovModelsDir }}
              subPath: ovmodels
            - name: volume-data
              mountPath: /tmp/dataprep
              subPath: tmpvideos
            {{- if $mmUsesNpu }}
            - name: dev-accel
              mountPath: /dev/accel
            {{- else if $mmUsesGpu }}
            - name: dev-dri
              mountPath: /dev/dri
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: volume-data
          {{- if .Values.global.usePvc }}
          persistentVolumeClaim:
            {{- if .Values.modelPvc.enabled }}
            claimName: {{ .Values.modelPvc.existingClaim | default (printf "%s-mmes-models-pvc" (include "lvs.mmes.fullname" .)) }}
            {{- else }}
            claimName: {{ include "lvs.mmes.fullname" . }}-mmes-data-pvc
            {{- end }}
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if $mmUsesNpu }}
        - name: dev-accel
          hostPath:
            path: /dev/accel
            type: Directory
        {{- else if $mmUsesGpu }}
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
        {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
