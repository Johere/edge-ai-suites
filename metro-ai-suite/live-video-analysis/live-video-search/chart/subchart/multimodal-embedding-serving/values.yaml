global:
  volumeHostPath: ''
  usePvc: true
  keepPvc: false
  env:
    defaultClipDuration: '-1'
    defaultNumFrames: '64'
    defaultStartOffsetSec: '0'
    embeddingModelName: ''
    embeddingUseOv: 'true'
    ovModelsDir: /app/ov_models
    ovPerformanceMode: THROUGHPUT
    inferBatchSize: '32'
    preprocessWorkers: '8'
    videoFrameBatchSize: '64'
    videoFrameQueueSize: '32'
    videoFrameShmPoolBlockSize: '6220800'
    videoFrameShmPoolBlocksMultiplier: '2'
    videoFrameLogLevel: 'INFO'
  accelGroupIds:
    - 992
  devices:
    multimodalEmbedding:
      device: CPU
      key: ''
  proxy:
    httpProxy: ''
    httpsProxy: ''
    noProxy: localhost,127.0.0.1,.svc.cluster.local
  registry: ''
  tag: latest
  vssStackTag: ''
images:
  multimodalEmbeddingServing:
    repository: multimodal-embedding-serving

imageOverride:
  registry: ''
  repository: ''
  tag: ''

replicaCount: 1

imagePullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

resources: {}

# OpenVINO model cache directory. Points at the persistent ov_models mount so an
# NPU/GPU first-compile is written once and reused across restarts (avoids slow
# recompilation and startup-probe crash loops). Used when device is GPU/NPU.
ovCacheDir: "/app/ov_models/ov_cache"

modelPvc:
  enabled: true
  existingClaim: ''
  storageClassName: ''
  accessModes:
    - ReadWriteOnce
  size: 10Gi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 6

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 180

nodeSelector: {}

tolerations: []

affinity: {}

# Optional pod affinity rules for this microservice.
podAffinity: {}
