# =============================================================================
# OVMS (OpenVINO Model Server) Subchart Values
# =============================================================================

enabled: true

image:
  repository: openvino/model_server
  tag: "2026.1"
  gpuTag: "2026.1-gpu"
  pullPolicy: IfNotPresent

initImage:
  repository: python
  tag: "3.12-slim"
  pullPolicy: IfNotPresent

replicas: 1

trustedCompute:
  enabled: false
  tc_gpu_enabled: false
  tc_gpu_cdiAnnotations:
    - gpu.intel.com/igpu=tc
  tcvm_default_memory: "16384"
  tcvm_pcie_root_port: "1"
  tcvm_hot_plug_vfio: "root-port"
  tc_push_host: "127.0.0.1"
  tc_relay_listen_port: "8186"
  tc_metrics_manager_port: "8186"
  tc_push_path: "/write"
  tc_matrix_relay_image: "alpine/socat"
  tc_matrix_relay_tag: "1.8.1.3"
  resources:
    requests:
      cpu: "4"
    limits:
      cpu: "6"

service:
  type: NodePort
  port: 8000

env:
  modelName: "OpenVINO/Phi-3.5-vision-instruct-int8-ov"
  targetDevice: "CPU"
  weightFormat: ""
  maxCompletionTokens: "1500"
  logLevel: "INFO"

huggingfaceToken: ""

gpu:
  enabled: true
  # Use "gpu.intel.com/i915" for integrated / Arc A-series.
  # Use "gpu.intel.com/xe" for Data Center GPU Flex / Max (Xe).
  resourceName: "gpu.intel.com/i915"
  resourceLimit: 1
  # Override via --set-json 'ovms.gpu.renderGroupIds=[<your-gid>]'.
  # Find the correct GID on a node: getent group render
  renderGroupIds:
    - 44
    - 109
    - 992

nodeSelector: {}
#   intel.feature.node.kubernetes.io/gpu: "true"

healthcheck:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 180

resources:
  requests:
    memory: "12Gi"

persistence:
  enabled: true
  size: 20Gi
  storageClass: ""
  keepOnUninstall: true
