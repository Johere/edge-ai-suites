# Detection service: owns the DL Streamer pipeline lifecycle (start/poll) and
# the raw-detection MQTT subscriber (writes detections into storage-service).
# Publishes a "batch-complete" MQTT event when a run finishes; the
# agent-service reacts to that event on its own and never calls this service.
#
# Depends on: storage-service, mqtt-broker, dlstreamer-pipeline-server (compose.base.yaml)

services:
  apm-detection:
    image: ${REGISTRY:-intel/}apm-detection-service:${TAG:-1.0.0}
    container_name: apm-detection
    hostname: apm-detection
    build:
      context: ../services/detection-service
      dockerfile: Dockerfile
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-},apm-storage,mqtt-broker,dlstreamer-pipeline-server,localhost
      APM_API_KEY: ${APM_API_KEY:-change-me-apm-key}
      # DL Streamer Pipeline Server
      DLSTREAMER_URL: http://dlstreamer-pipeline-server:8554
      DLSTREAMER_PIPELINE_NAME: ${DLSTREAMER_PIPELINE_NAME:-pipeline_defect_detection}
      # Storage service
      STORAGE_SERVICE_URL: http://apm-storage:5001
      # MQTT — raw detections (from dlstreamer-pipeline-server) and the
      # generic "batch-complete" event this service publishes when a run ends
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_TOPIC: ${MQTT_DETECTION_TOPIC:-apm/detections}
      MQTT_BATCH_TOPIC: ${MQTT_BATCH_TOPIC:-apm/batch-complete}
      # Available source videos (shared with dlstreamer-pipeline-server's own mount)
      VIDEOS_DIR: /app/videos
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${USE_CASE_RESOURCES_DIR:-/tmp/resources}/videos:/app/videos:ro
    ports:
      - "${DETECTION_PORT:-5004}:5004"
    depends_on:
      apm-storage:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    networks:
      - apm_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5004/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
