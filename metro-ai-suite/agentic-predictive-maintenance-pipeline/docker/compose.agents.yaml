# Agent service: LangGraph meta-agent + 4 worker agents.
# Detection-agnostic — reacts to the detection layer's "batch-complete" MQTT
# event (see compose.detection.yaml) and never talks to DL Streamer directly.
# Depends on: storage-service, mqtt-broker (compose.base.yaml)

services:
  apm-agent:
    # Pulled from the EAL agent-quality-handler microservice — no longer
    # built from this repo. See services/agent-service (removed) history
    # for the prior in-repo implementation this replaced.
    image: ${REGISTRY:-intel/}agent-quality-handler:${TAG:-1.0.0}
    container_name: apm-agent
    hostname: apm-agent
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-},apm-storage,apm-llm,mqtt-broker,localhost
      # Storage service
      STORAGE_SERVICE_URL: http://apm-storage:5001
      # LLM service (OVMS — OpenVINO Model Server)
      LLM_BASE_URL: http://apm-llm:8000/v3
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      LLM_MODE: ${LLM_MODE:-server}
      LLM_API_KEY: ${LLM_API_KEY:-UNUSED}
      # MQTT — subscribes only to the detection layer's "batch-complete"
      # event; never subscribes to raw detections directly.
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_BATCH_TOPIC: ${MQTT_BATCH_TOPIC:-apm/batch-complete}
      MQTT_QOS: ${MQTT_QOS:-1}
      MQTT_KEEPALIVE: ${MQTT_KEEPALIVE:-60}
      MQTT_MAX_PAYLOAD_BYTES: ${MQTT_MAX_PAYLOAD_BYTES:-1048576}
      MQTT_BATCH_CLIENT_ID: ${MQTT_BATCH_CLIENT_ID:-apm-agent-batch}
      # Use-case config — agents.yaml itself declares use_case_id
      AGENTS_CONFIG_PATH: /app/config/agents.yaml
      USE_CASE_PROMPTS_DIR: /app/prompts
      USE_CASE_CONFIGS_DIR: /app/config
      FALLBACK_POLICY_PATH: /app/config/policy_fallback.json
      # Run retention (in-memory registry + persisted output pruning)
      RUN_RETENTION_SECONDS: ${RUN_RETENTION_SECONDS:-86400}
      MAX_RETAINED_RUNS: ${MAX_RETAINED_RUNS:-1000}
      # Outputs
      OUTPUT_DIR: /app/output
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${USE_CASE_CONFIGS_DIR:-/tmp/apm-placeholder}/agents.yaml:/app/config/agents.yaml:ro
      - ${USE_CASE_CONFIGS_DIR:-/tmp/apm-placeholder}/policy_fallback.json:/app/config/policy_fallback.json:ro
      - ${USE_CASE_PROMPTS_DIR:-/tmp/apm-placeholder}:/app/prompts:ro
      - apm_agent_output:/app/output
    ports:
      - "${AGENT_PORT:-5002}:5002"
    depends_on:
      apm-storage:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    networks:
      - apm_network
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  apm_agent_output:
    driver: local
