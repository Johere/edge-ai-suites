server:
  host: "0.0.0.0"
  port: 8999

webhook:
  url: "http://localhost:18800/events"
  timeout: 10
  retry_attempts: 3
  retry_delay: 2

data_dir: "~/.smartbuilding/data"

defaults:
  motion:
    diff_threshold: 15
    area_ratio: 0.005
    stable_frames: 45
  segment:
    max_duration: 60
    min_duration: 1.0
  recording:
    interval: 60
    fps: 15
    retention_days: 5
  prefilter:
    enabled: true
    model_path: "/models/openvino/shape_static_1280x704/yolo11s/FP16/yolo11s.xml"
    target_classes: ["person"]
    min_confidence: 0.4
    min_frames_hit: 2
    detect_fps: 2.0
    device: "CPU"

logging:
  level: "INFO"
